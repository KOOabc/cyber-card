<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管理后台 - 赛博名片</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: #0F0E0D;
      color: #fff;
      padding: 40px 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 12px;
      color: #E85D24;
    }
    .stats {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      margin: 24px 0;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 16px;
    }
    .stat-card {
      background: rgba(232,93,36,0.1);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(232,93,36,0.3);
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #E85D24;
    }
    .stat-label {
      font-size: 14px;
      color: #999;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #16A34A; color: #fff; }
    .btn-primary:hover { background: #15803d; transform: translateY(-2px); }
    .btn-secondary { background: #E85D24; color: #fff; }
    .btn-secondary:hover { background: #C94B0A; transform: translateY(-2px); }
    .btn-danger { background: #DC2626; color: #fff; }
    .btn-danger:hover { background: #B91C1C; transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 2px solid #666; color: #fff; }
    .btn-outline:hover { border-color: #E85D24; color: #E85D24; }
    .table-container {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      overflow: hidden;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead {
      background: rgba(232,93,36,0.15);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    th {
      padding: 14px 10px;
      text-align: left;
      font-weight: 600;
      color: #E85D24;
      white-space: nowrap;
    }
    td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #ccc;
    }
    tr:hover {
      background: rgba(232,93,36,0.05);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .alert {
      background: rgba(232,93,36,0.1);
      border: 1px solid rgba(232,93,36,0.3);
      padding: 16px 20px;
      border-radius: 10px;
      margin: 20px 0;
      color: #E85D24;
    }
    .copy-btn {
      background: rgba(232,93,36,0.2);
      border: 1px solid rgba(232,93,36,0.4);
      color: #E85D24;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      margin-left: 8px;
    }
    .copy-btn:hover {
      background: rgba(232,93,36,0.3);
    }
    .filter-section {
      background: rgba(255,255,255,0.03);
      padding: 16px;
      border-radius: 10px;
      margin: 20px 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-section input {
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
    }
    .filter-section input::placeholder {
      color: #666;
    }
    .highlight {
      background: rgba(232,93,36,0.2);
      padding: 2px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 数据管理后台</h1>
    <p style="color: #999; margin-bottom: 24px;">管理和导出赛博名片用户提交的数据</p>

    <div class="stats">
      <div style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">数据统计</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">总提交数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="todayCount">0</div>
          <div class="stat-label">今日新增</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="weekCount">0</div>
          <div class="stat-label">本周新增</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="storageSize">0 KB</div>
          <div class="stat-label">数据大小</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="exportToCSV()">⬇ 导出 CSV</button>
      <button class="btn-primary" onclick="exportToExcel()">📊 导出 Excel</button>
      <button class="btn-secondary" onclick="exportToJSON()">📄 导出 JSON</button>
      <button class="btn-outline" onclick="copyAllData()">📋 复制全部数据</button>
      <button class="btn-danger" onclick="clearAllData()">🗑 清空所有数据</button>
      <button class="btn-outline" onclick="window.location.href='/'">← 返回首页</button>
    </div>

    <div class="filter-section">
      <span style="color: #999;">筛选：</span>
      <input type="text" id="searchInput" placeholder="搜索姓名、公司、邮箱..." oninput="filterData()">
      <input type="date" id="dateFrom" onchange="filterData()">
      <span style="color: #666;">至</span>
      <input type="date" id="dateTo" onchange="filterData()">
      <button class="btn-outline" style="padding: 8px 16px;" onclick="resetFilter()">重置</button>
    </div>

    <div id="alertContainer"></div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>序号</th>
            <th>提交时间</th>
            <th>姓名</th>
            <th>公司</th>
            <th>职位</th>
            <th>手机</th>
            <th>微信</th>
            <th>邮箱</th>
            <th>AI方向</th>
            <th>出海计划</th>
            <th>目标市场</th>
            <th>算力需求</th>
            <th>业务介绍</th>
            <th>模板</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="dataTable">
          <tr>
            <td colspan="15" class="empty-state">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let allData = [];
    let filteredData = [];

    // 加载数据
    function loadData() {
      const stored = localStorage.getItem('cyber_card_submissions');
      if (!stored) {
        allData = [];
        filteredData = [];
        showAlert('暂无数据', 'info');
      } else {
        allData = JSON.parse(stored);
        filteredData = [...allData];
      }
      updateStats();
      renderTable();
    }

    // 更新统计数据
    function updateStats() {
      const total = allData.length;
      const today = allData.filter(d => {
        const submitDate = new Date(d.submitTime);
        const todayDate = new Date();
        return submitDate.toDateString() === todayDate.toDateString();
      }).length;
      
      const weekAgo = new Date();
      weekAgo.setDate(weekAgo.getDate() - 7);
      const week = allData.filter(d => {
        const submitDate = new Date(d.submitTime);
        return submitDate >= weekAgo;
      }).length;

      const stored = localStorage.getItem('cyber_card_submissions') || '';
      const sizeKB = (new Blob([stored]).size / 1024).toFixed(2);

      document.getElementById('totalCount').textContent = total;
      document.getElementById('todayCount').textContent = today;
      document.getElementById('weekCount').textContent = week;
      document.getElementById('storageSize').textContent = sizeKB + ' KB';
    }

    // 渲染表格
    function renderTable() {
      const tbody = document.getElementById('dataTable');
      
      if (filteredData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="15" class="empty-state">暂无数据</td></tr>';
        return;
      }

      tbody.innerHTML = filteredData.slice().reverse().map((item, index) => `
        <tr>
          <td>${filteredData.length - index}</td>
          <td>${item.submitTime || '-'}</td>
          <td><strong style="color: #fff;">${item.realName || '-'}</strong></td>
          <td>${item.company || '-'}</td>
          <td>${item.title || '-'}</td>
          <td>${item.phone || '-'}</td>
          <td>${item.wechat || '-'}</td>
          <td>${item.email || '-'}</td>
          <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;" title="${item.aiDirection}">${item.aiDirection || '-'}</td>
          <td>${item.isOversea || '-'}</td>
          <td>${item.overseaMarkets || '-'}</td>
          <td>${item.cloudNeed || '-'}</td>
          <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis;" title="${item.businessIntro}">${item.businessIntro || '-'}</td>
          <td><span style="color: #E85D24; font-weight: 600;">${item.templateId || '-'}</span></td>
          <td>
            <button class="copy-btn" onclick="copyRow(${filteredData.length - index - 1})">复制</button>
          </td>
        </tr>
      `).join('');
    }

    // 筛选数据
    function filterData() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      filteredData = allData.filter(item => {
        // 搜索过滤
        const matchesSearch = !searchTerm || 
          (item.realName && item.realName.toLowerCase().includes(searchTerm)) ||
          (item.company && item.company.toLowerCase().includes(searchTerm)) ||
          (item.email && item.email.toLowerCase().includes(searchTerm)) ||
          (item.phone && item.phone.includes(searchTerm));

        // 日期过滤
        let matchesDate = true;
        if (dateFrom || dateTo) {
          const itemDate = new Date(item.submitTime);
          if (dateFrom) matchesDate = matchesDate && itemDate >= new Date(dateFrom);
          if (dateTo) matchesDate = matchesDate && itemDate <= new Date(dateTo + ' 23:59:59');
        }

        return matchesSearch && matchesDate;
      });

      renderTable();
    }

    // 重置筛选
    function resetFilter() {
      document.getElementById('searchInput').value = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      filteredData = [...allData];
      renderTable();
    }

    // 复制单行数据
    function copyRow(index) {
      const item = filteredData[index];
      const text = JSON.stringify(item, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        showAlert('✅ 已复制到剪贴板', 'success');
      });
    }

    // 导出为 CSV
    function exportToCSV() {
      if (filteredData.length === 0) {
        showAlert('❌ 暂无数据可导出', 'error');
        return;
      }

      const headers = ['序号', '提交时间', '姓名', '公司', '职位', '手机', '微信', '邮箱', 'AI方向', '出海计划', '目标市场', '算力需求', '业务介绍', '展示名称', '职业身份', '所属机构', '个人简介', '技能标签', '模板ID'];
      
      const rows = filteredData.map((item, index) => [
        index + 1,
        item.submitTime || '',
        item.realName || '',
        item.company || '',
        item.title || '',
        item.phone || '',
        item.wechat || '',
        item.email || '',
        item.aiDirection || '',
        item.isOversea || '',
        item.overseaMarkets || '',
        item.cloudNeed || '',
        item.businessIntro || '',
        item.displayName || '',
        item.titles || '',
        item.organization || '',
        item.bio || '',
        item.skills || '',
        item.templateId || ''
      ]);

      const csvContent = [headers, ...rows]
        .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
        .join('\n');

      const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
      downloadFile(blob, `赛博名片数据_${getDateString()}.csv`);
      showAlert('✅ CSV 文件已导出', 'success');
    }

    // 导出为 Excel (实际上是 CSV，但 Excel 能打开)
    function exportToExcel() {
      exportToCSV(); // 使用 CSV 格式，Excel 可以直接打开
    }

    // 导出为 JSON
    function exportToJSON() {
      if (filteredData.length === 0) {
        showAlert('❌ 暂无数据可导出', 'error');
        return;
      }

      const jsonContent = JSON.stringify(filteredData, null, 2);
      const blob = new Blob([jsonContent], { type: 'application/json;charset=utf-8;' });
      downloadFile(blob, `赛博名片数据_${getDateString()}.json`);
      showAlert('✅ JSON 文件已导出', 'success');
    }

    // 复制全部数据
    function copyAllData() {
      if (filteredData.length === 0) {
        showAlert('❌ 暂无数据可复制', 'error');
        return;
      }

      const text = JSON.stringify(filteredData, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        showAlert(`✅ 已复制 ${filteredData.length} 条数据到剪贴板`, 'success');
      }).catch(() => {
        showAlert('❌ 复制失败，请手动选择并复制', 'error');
      });
    }

    // 清空所有数据
    function clearAllData() {
      if (!confirm(`⚠️ 确定要清空所有 ${allData.length} 条数据吗？\n\n此操作不可恢复！建议先导出备份。`)) {
        return;
      }

      if (!confirm('再次确认：真的要删除所有数据吗？')) {
        return;
      }

      localStorage.removeItem('cyber_card_submissions');
      showAlert('✅ 所有数据已清空', 'success');
      loadData();
    }

    // 下载文件
    function downloadFile(blob, filename) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 显示提示
    function showAlert(message, type = 'info') {
      const container = document.getElementById('alertContainer');
      const colors = {
        success: '#16A34A',
        error: '#DC2626',
        info: '#E85D24'
      };
      
      container.innerHTML = `
        <div class="alert" style="border-color: ${colors[type]}; background: ${colors[type]}20; color: ${colors[type]};">
          ${message}
        </div>
      `;

      setTimeout(() => {
        container.innerHTML = '';
      }, 3000);
    }

    // 获取日期字符串
    function getDateString() {
      const now = new Date();
      return `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
    }

    // 页面加载时执行
    window.onload = loadData;

    // 自动刷新（每30秒）
    setInterval(() => {
      loadData();
    }, 30000);
  </script>
</body>
</html>
